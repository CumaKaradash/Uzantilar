<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Metric Mute</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body data-theme="light" data-lang="en">

  <div class="container">

    <!-- Header -->
    <header class="header">
      <div class="logo">
        <svg class="logo-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 8h12a0 0 0 0 1 0 0v5a5 5 0 0 1-5 5H8a5 5 0 0 1-5-5V8z"/>
          <path d="M15 8h3a3 3 0 0 1 0 6h-3"/>
          <path d="M6 4s0 2 2 2 2-2 2-2"/>
          <path d="M10 4s0 2 2 2 2-2 2-2"/>
        </svg>
        <span class="logo-text">Metric Mute</span>
      </div>

      <div class="header-controls">
        <!-- Language Toggle -->
        <button class="lang-btn" id="langToggle" aria-label="Toggle language">
          <span id="langLabel">TR</span>
        </button>

        <!-- Theme Toggle -->
        <button class="theme-btn" id="themeToggle" aria-label="Toggle theme">
          <svg class="icon-sun" viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="12" r="4" fill="currentColor"/>
            <path d="M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
          <svg class="icon-moon" viewBox="0 0 24 24" fill="none">
            <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" fill="currentColor"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Main Toggle -->
    <main class="main">
      <div class="toggle-section">
        <div class="toggle-info">
          <p class="toggle-title" data-i18n="toggleTitle">Hide Metrics</p>
          <p class="toggle-subtitle" data-i18n="toggleSubtitle">Numbers on social media</p>
        </div>

        <button class="power-toggle" id="mainToggle" aria-label="Toggle Metric Mute">
          <span class="toggle-track">
            <span class="toggle-thumb"></span>
          </span>
        </button>
      </div>

      <div class="status-pill" id="statusPill">
        <span class="status-dot"></span>
        <span class="status-text" data-i18n="statusOn">Active</span>
      </div>
    </main>

    <!-- Platforms -->
    <section class="platforms">
      <p class="platforms-label" data-i18n="platformsLabel">Supported platforms</p>
      <div class="platform-chips">
        <span class="chip">𝕏 / Twitter</span>
        <span class="chip">Instagram</span>
        <span class="chip">LinkedIn</span>
        <span class="chip">YouTube</span>
      </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
      <p data-i18n="footerText">Focus on content, not numbers.</p>
      <p class="developer-text">Cuma Karadash tarafından geliştirildi</p>
      <div class="footer-buttons">
        <a href="https://github.com/CumaKaradash" target="_blank" class="footer-btn">GitHub</a>
        <a href="https://buymeacoffee.com/cumakaradash" target="_blank" class="footer-btn">Bir kahve ısmarlama</a>
      </div>
    </footer>

  </div>

  <script src="popup.js"></script>
</body>
</html>
