<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Icon Generator - Coffee Cup</title>
    <style>
      body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; margin: 20px; }
      .row { display: flex; gap: 16px; align-items: center; margin-bottom: 12px; }
      canvas { border: 1px solid #ddd; }
      button { padding: 6px 10px; }
    </style>
  </head>
  <body>
    <h1>Generate PNG Icons (16/32/48/128)</h1>
    <p>Draws a minimalist coffee cup and lets you download PNGs. Save into <strong>icons/</strong> as icon16.png, icon32.png, icon48.png, icon128.png.</p>
    <div id="rows"></div>
    <script>
      const sizes = [16, 32, 48, 128];
      const rows = document.getElementById('rows');
      function drawCoffee(ctx, size) {
        ctx.clearRect(0,0,size,size);
        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = Math.max(1, Math.floor(size / 12));
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        const s = size;
        // background (dark) for visibility; remove if you prefer transparent bg
        ctx.fillStyle = '#2c2f36';
        ctx.fillRect(0,0,s,s);
        // cup body
        ctx.beginPath();
        ctx.moveTo(s*0.2, s*0.35);
        ctx.lineTo(s*0.7, s*0.35);
        ctx.lineTo(s*0.7, s*0.65);
        ctx.quadraticCurveTo(s*0.7, s*0.85, s*0.5, s*0.85);
        ctx.lineTo(s*0.4, s*0.85);
        ctx.quadraticCurveTo(s*0.2, s*0.85, s*0.2, s*0.65);
        ctx.lineTo(s*0.2, s*0.35);
        ctx.stroke();
        // handle
        ctx.beginPath();
        ctx.moveTo(s*0.7, s*0.42);
        ctx.quadraticCurveTo(s*0.88, s*0.45, s*0.86, s*0.60);
        ctx.quadraticCurveTo(s*0.84, s*0.73, s*0.70, s*0.68);
        ctx.stroke();
        // steam
        const steam = (x) => {
          ctx.beginPath();
          ctx.moveTo(x, s*0.22);
          ctx.quadraticCurveTo(x+ s*0.02, s*0.18, x, s*0.14);
          ctx.stroke();
        };
        steam(s*0.35);
        steam(s*0.45);
      }

      sizes.forEach((size) => {
        const row = document.createElement('div');
        row.className = 'row';
        const canvas = document.createElement('canvas');
        canvas.width = size; canvas.height = size;
        const ctx = canvas.getContext('2d');
        drawCoffee(ctx, size);
        const btn = document.createElement('button');
        btn.textContent = `Download ${size}px`;
        btn.addEventListener('click', () => {
          const a = document.createElement('a');
          a.download = `icon${size}.png`;
          a.href = canvas.toDataURL('image/png');
          a.click();
        });
        row.appendChild(canvas);
        row.appendChild(btn);
        rows.appendChild(row);
      });
    </script>
  </body>
  </html>
