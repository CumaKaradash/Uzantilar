<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dyslexia Beam</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body data-theme="light" data-lang="en">

  <div class="container">

    <!-- Header -->
    <header class="header">
      <div class="logo">
        <svg class="logo-icon" viewBox="0 0 32 32" fill="none">
          <!-- Book shape -->
          <rect x="4" y="6" width="24" height="20" rx="3" fill="none" stroke="currentColor" stroke-width="1.8"/>
          <line x1="16" y1="6" x2="16" y2="26" stroke="currentColor" stroke-width="1.4"/>
          <!-- Beam highlight lines -->
          <rect x="6" y="13" width="8" height="3" rx="1.5" fill="var(--beam-color)" opacity="0.9"/>
          <rect x="18" y="13" width="8" height="3" rx="1.5" fill="var(--beam-color)" opacity="0.9"/>
        </svg>
        <span class="logo-text">Dyslexia Beam</span>
      </div>

      <div class="header-controls">
        <button class="ctrl-btn" id="langToggle" aria-label="Toggle language">
          <span id="langLabel">TR</span>
        </button>
        <button class="ctrl-btn icon-btn" id="themeToggle" aria-label="Toggle theme">
          <svg class="icon-sun" viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="12" r="4" fill="currentColor"/>
            <path d="M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
          <svg class="icon-moon" viewBox="0 0 24 24" fill="none">
            <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" fill="currentColor"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Main toggle -->
    <section class="card main-card">
      <div class="card-row">
        <div class="card-info">
          <p class="card-title" data-i18n="toggleTitle">Reading Mode</p>
          <p class="card-sub"   data-i18n="toggleSub">Font &amp; beam on this page</p>
        </div>
        <button class="toggle-btn" id="mainToggle" aria-label="Toggle Dyslexia Beam">
          <span class="toggle-track">
            <span class="toggle-thumb"></span>
          </span>
        </button>
      </div>
      <div class="status-pill" id="statusPill">
        <span class="status-dot"></span>
        <span class="status-text" data-i18n="statusOn">Active</span>
      </div>
    </section>

    <!-- Feature list -->
    <section class="card features-card">
      <p class="section-label" data-i18n="featuresLabel">What it does</p>
      <ul class="feature-list">
        <li class="feature-item">
          <span class="feat-icon">𝖠</span>
          <span data-i18n="feat1">OpenDyslexic font on all text</span>
        </li>
        <li class="feature-item">
          <span class="feat-icon beam-icon"></span>
          <span data-i18n="feat2">Reading beam follows your cursor</span>
        </li>
        <li class="feature-item">
          <span class="feat-icon">↕</span>
          <span data-i18n="feat3">Wider spacing &amp; line height</span>
        </li>
      </ul>
    </section>

    <!-- Footer -->
    <footer class="footer">
      <p data-i18n="footerText">Read with ease, every page.</p>
    </footer>

  </div>

  <script src="popup.js"></script>
</body>
</html>
