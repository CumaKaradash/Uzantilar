<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Local Vault</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body class="theme-dark">

  <div class="shell">

    <!-- ── Header ─────────────────────────────────────────── -->
    <header class="header">
      <div class="brand">
        <svg class="brand-icon" viewBox="0 0 24 24" fill="none">
          <rect x="3" y="11" width="18" height="11" rx="2"
                stroke="currentColor" stroke-width="1.6" fill="none"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"
                stroke="currentColor" stroke-width="1.6"
                stroke-linecap="round" fill="none"/>
          <circle cx="12" cy="16" r="1.5" fill="currentColor"/>
        </svg>
        <span class="brand-name">Local Vault</span>
      </div>

      <div class="header-right">
        <button class="icon-btn" id="btn-lang" title="Switch language">
          <span id="lang-label">EN</span>
        </button>
        <button class="icon-btn" id="btn-theme" title="Toggle theme">
          <svg id="icon-sun" viewBox="0 0 24 24" fill="none" width="14" height="14">
            <circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="1.7"/>
            <path d="M12 2v2M12 20v2M2 12h2M20 12h2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"
                  stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
          </svg>
          <svg id="icon-moon" viewBox="0 0 24 24" fill="none" width="14" height="14" style="display:none">
            <path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 1 0 9.79 9.79z"
                  stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
          </svg>
        </button>

        <!-- Master toggle -->
        <label class="toggle-wrap" title="Enable / Disable vault">
          <input type="checkbox" id="master-toggle" checked />
          <span class="toggle-track">
            <span class="toggle-thumb"></span>
          </span>
        </label>
      </div>
    </header>

    <!-- ── Status bar ──────────────────────────────────────── -->
    <div class="status-bar" id="status-bar">
      <span class="status-dot" id="status-dot"></span>
      <span class="status-text" id="status-text" data-i18n="statusOn">Vault active</span>
      <span class="count-badge" id="count-badge">0</span>
    </div>

    <!-- ── Entry list ──────────────────────────────────────── -->
    <div class="list-wrap" id="list-wrap">
      <div class="empty-state" id="empty-state">
        <svg viewBox="0 0 24 24" fill="none" width="28" height="28" opacity="0.3">
          <rect x="3" y="11" width="18" height="11" rx="2" stroke="currentColor" stroke-width="1.5"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <p data-i18n="emptyHint">Copy text anywhere to save it here.</p>
      </div>

      <ul class="entry-list" id="entry-list"></ul>
    </div>

    <!-- ── Footer ─────────────────────────────────────────── -->
    <footer class="footer">
      <span class="session-note" data-i18n="sessionNote">🔒 Cleared on exit · RAM only</span>
      <button class="clear-btn" id="btn-clear" data-i18n="clearAll">Clear all</button>
    </footer>

  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script src="popup.js"></script>
</body>
</html>
