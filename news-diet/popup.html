<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>News Diet</title>
  <link rel="stylesheet" href="popup.css"/>
</head>
<body class="theme-dark">

<div class="shell">

  <!-- Header -->
  <header class="header">
    <div class="brand">
      <!-- Salad bowl / leaf icon -->
      <svg class="brand-icon" viewBox="0 0 24 24" fill="none">
        <!-- Bowl -->
        <path d="M4 11h16a8 8 0 0 1-16 0z"
              stroke="currentColor" stroke-width="1.6"
              stroke-linejoin="round" fill="none"/>
        <!-- Left leaf -->
        <path d="M8 11 C7 8 4 7 3 5 C5 5 8 7 8 11Z"
              fill="currentColor" opacity="0.5"/>
        <!-- Right leaf -->
        <path d="M16 11 C17 8 20 7 21 5 C19 5 16 7 16 11Z"
              fill="currentColor" opacity="0.5"/>
        <!-- Center stem -->
        <path d="M12 11 C12 8 13 5 12 3 C11 5 12 8 12 11Z"
              fill="currentColor" opacity="0.7"/>
        <!-- Handle line -->
        <line x1="4" y1="11" x2="20" y2="11"
              stroke="currentColor" stroke-width="1.4" opacity="0.3"/>
      </svg>
      <span class="brand-name">News Diet</span>
    </div>

    <div class="hdr-right">
      <button class="icon-btn" id="btn-lang">
        <span id="lang-label">EN</span>
      </button>
      <button class="icon-btn" id="btn-theme">
        <svg id="icon-sun"  viewBox="0 0 24 24" fill="none" width="14" height="14">
          <circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="1.7"/>
          <path d="M12 2v2M12 20v2M2 12h2M20 12h2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"
                stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
        </svg>
        <svg id="icon-moon" viewBox="0 0 24 24" fill="none" width="14" height="14" style="display:none">
          <path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 1 0 9.79 9.79z"
                stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- Main toggle -->
  <section class="power-section">
    <div class="power-ring" id="power-ring">
      <button class="power-btn" id="btn-power">
        <svg viewBox="0 0 24 24" fill="none" width="26" height="26">
          <path d="M12 3v6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
          <path d="M18.4 5.6A9 9 0 1 1 5.6 5.6"
                stroke="currentColor" stroke-width="2.2" stroke-linecap="round" fill="none"/>
        </svg>
      </button>
    </div>
    <p class="power-status" id="power-status" data-i18n="statusOff">Inactive</p>
  </section>

  <!-- What gets cleaned -->
  <div class="cleaned-section" id="cleaned-section">
    <p class="cleaned-title" data-i18n="cleanedTitle">Filtered on this page</p>
    <div class="pill-row">
      <span class="pill" data-i18n="pillSidebar">Sidebars</span>
      <span class="pill" data-i18n="pillRelated">Related</span>
      <span class="pill" data-i18n="pillTrending">Trending</span>
      <span class="pill" data-i18n="pillBreaking">Breaking banners</span>
      <span class="pill" data-i18n="pillAds">Ads / Sponsored</span>
      <span class="pill" data-i18n="pillNewsletters">Newsletters</span>
      <span class="pill" data-i18n="pillComments">Comments</span>
      <span class="pill" data-i18n="pillHeadlines">Headline typography</span>
    </div>
  </div>

  <!-- Footer note -->
  <p class="footnote" data-i18n="footnote">Reload already-open tabs to apply.</p>

</div>

<script src="popup.js"></script>
</body>
</html>
