<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>One-Task Timer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="popup.css"/>
</head>
<body class="theme-dark">

<div class="shell">

  <!-- Header -->
  <header class="header">
    <div class="brand">
      <svg class="brand-icon" viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.6" fill="none"/>
        <path d="M12 7v5l3 3" stroke="currentColor" stroke-width="1.8"
              stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M12 3V1M12 23v-2M3 12H1M23 12h-2" stroke="currentColor" stroke-width="1.4"
              stroke-linecap="round" opacity="0.4"/>
      </svg>
      <span class="brand-name">One-Task Timer</span>
    </div>
    <div class="hdr-right">
      <button class="icon-btn" id="btn-lang"><span id="lang-label">EN</span></button>
      <button class="icon-btn" id="btn-theme">
        <svg id="icon-sun"  viewBox="0 0 24 24" fill="none" width="14" height="14">
          <circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="1.7"/>
          <path d="M12 2v2M12 20v2M2 12h2M20 12h2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"
                stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
        </svg>
        <svg id="icon-moon" viewBox="0 0 24 24" fill="none" width="14" height="14" style="display:none">
          <path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 1 0 9.79 9.79z"
                stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- Active timer view -->
  <div class="active-view" id="active-view" style="display:none">
    <div class="active-clock-wrap">
      <svg class="ring-svg" viewBox="0 0 80 80">
        <circle class="ring-bg"   cx="40" cy="40" r="34" />
        <circle class="ring-fill" id="ring-fill" cx="40" cy="40" r="34"
                stroke-dasharray="213.6" stroke-dashoffset="0"/>
      </svg>
      <div class="clock-center">
        <span class="clock-time" id="active-time">00:00</span>
      </div>
    </div>
    <p class="active-task" id="active-task-label">—</p>
    <button class="stop-btn" id="btn-stop" data-i18n="stop">Stop</button>
  </div>

  <!-- Setup view -->
  <div class="setup-view" id="setup-view">

    <div class="input-group">
      <label class="input-label" for="task-input" data-i18n="taskLabel">Task</label>
      <input class="task-input" id="task-input" type="text" maxlength="80"
             autocomplete="off" spellcheck="false"
             data-placeholder-en="What are you working on?"
             data-placeholder-tr="Ne üzerinde çalışıyorsun?"/>
    </div>

    <div class="input-group">
      <label class="input-label" for="dur-input" data-i18n="durationLabel">Duration (min)</label>
      <div class="dur-row">
        <input class="dur-input" id="dur-input" type="number" min="1" max="180" value="25"/>
        <div class="quick-btns">
          <button class="quick-btn" data-mins="5">5</button>
          <button class="quick-btn" data-mins="15">15</button>
          <button class="quick-btn" data-mins="25">25</button>
          <button class="quick-btn" data-mins="50">50</button>
        </div>
      </div>
    </div>

    <button class="start-btn" id="btn-start" data-i18n="start">Start Focus</button>

  </div>

  <!-- Tagline -->
  <p class="tagline" id="tagline" data-i18n="tagline">One task. One timer. All tabs.</p>

</div>

<script src="popup.js"></script>
</body>
</html>
