<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Privacy Shield</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body class="theme-dark">

  <div class="container">

    <!-- Header -->
    <header class="header">
      <div class="brand">
        <svg class="brand-icon" viewBox="0 0 24 24" fill="none">
          <path d="M12 2L3 6.5V12c0 4.5 3.8 8.7 9 10 5.2-1.3 9-5.5 9-10V6.5L12 2Z"
                fill="currentColor" opacity="0.15" stroke="currentColor" stroke-width="1.5"
                stroke-linejoin="round"/>
          <path d="M9 12l2 2 4-4" stroke="currentColor" stroke-width="1.8"
                stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span class="brand-name">Privacy Shield</span>
      </div>
      <div class="header-actions">
        <button class="icon-btn" id="btn-lang" title="Switch Language">
          <span id="lang-label">EN</span>
        </button>
        <button class="icon-btn" id="btn-theme" title="Switch Theme">
          <svg id="icon-sun" viewBox="0 0 24 24" fill="none" width="15" height="15">
            <circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="1.8"/>
            <path d="M12 2v2M12 20v2M2 12h2M20 12h2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"
                  stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
          <svg id="icon-moon" viewBox="0 0 24 24" fill="none" width="15" height="15" style="display:none">
            <path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 1 0 9.79 9.79z"
                  stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Shield Zone -->
    <section class="shield-zone">
      <div class="shield-wrap" id="shield-wrap">
        <button class="shield-btn" id="btn-power" aria-pressed="true">
          <svg class="shield-svg" viewBox="0 0 24 24" fill="none">
            <path class="shield-fill"
              d="M12 2L3 6.5V12c0 4.5 3.8 8.7 9 10 5.2-1.3 9-5.5 9-10V6.5L12 2Z"
              stroke-width="1.5" stroke-linejoin="round"/>
            <path d="M9 12l2 2 4-4" stroke="white" stroke-width="2"
                  stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
          </svg>
        </button>
        <div class="shield-pulse" id="shield-pulse"></div>
      </div>
      <p class="shield-status" id="shield-status" data-i18n="statusOn">Protected</p>
      <p class="shield-sub" id="shield-sub" data-i18n="subOn">Trackers are being blocked</p>
    </section>

    <!-- Tracker list -->
    <div class="tracker-list">
      <p class="tracker-list-title" data-i18n="blocking">Blocking</p>
      <div class="tracker-chips">
        <span class="chip">Google Analytics</span>
        <span class="chip">Meta Pixel</span>
        <span class="chip">Hotjar</span>
        <span class="chip">TikTok</span>
        <span class="chip">Doubleclick</span>
        <span class="chip">Microsoft Clarity</span>
        <span class="chip">Segment</span>
        <span class="chip">Mixpanel</span>
        <span class="chip">FullStory</span>
        <span class="chip">Amplitude</span>
        <span class="chip">Bing Ads</span>
        <span class="chip">+ 9 more</span>
      </div>
    </div>

    <!-- Footer -->
    <p class="footnote" data-i18n="footnote">20 tracker domains blocked via declarativeNetRequest.</p>

  </div>

  <script src="popup.js"></script>
</body>
</html>
