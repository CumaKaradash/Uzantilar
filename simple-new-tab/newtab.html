<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Focus</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Lato:wght@300;400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="newtab.css" />
</head>
<body class="theme-dark" id="body">

  <!-- Grain texture overlay -->
  <div class="grain" aria-hidden="true"></div>

  <!-- Time display -->
  <div class="time-wrap" id="time-wrap">
    <span class="time" id="clock"></span>
    <span class="date" id="date-display"></span>
  </div>

  <!-- Main focus area -->
  <main class="main">
    <div class="focus-container" id="focus-container">
      <input
        class="focus-input"
        id="focus-input"
        type="text"
        autocomplete="off"
        autocorrect="off"
        spellcheck="false"
        maxlength="80"
        data-placeholder-en="What is your focus today?"
        data-placeholder-tr="Bugün neye odaklanıyorsun?"
      />
      <div class="focus-line" id="focus-line"></div>
    </div>
  </main>

  <!-- Corner controls -->
  <div class="corner-controls" id="corner-controls">
    <button class="ctrl-btn" id="btn-theme" title="Toggle theme">
      <!-- Sun icon (shown in dark mode to switch to light) -->
      <svg id="icon-sun" class="ctrl-icon" viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="12" r="4.5" stroke="currentColor" stroke-width="1.5"/>
        <path d="M12 2v2M12 20v2M2 12h2M20 12h2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"
              stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <!-- Moon icon (shown in light mode to switch to dark) -->
      <svg id="icon-moon" class="ctrl-icon" viewBox="0 0 24 24" fill="none" style="display:none">
        <path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 1 0 9.79 9.79z"
              stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </button>

    <button class="ctrl-btn" id="btn-lang" title="Switch language">
      <span class="ctrl-lang-label" id="lang-label">EN</span>
    </button>
  </div>

  <script src="newtab.js"></script>
</body>
</html>
