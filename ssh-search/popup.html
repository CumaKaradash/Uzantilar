<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ssh! Search</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body data-theme="light" data-lang="en">

  <div class="container">

    <!-- Header -->
    <header class="header">
      <div class="logo">
        <span class="logo-icon">🤫</span>
        <span class="logo-text">Ssh! Search</span>
      </div>
      <div class="header-controls">
        <button class="ctrl-btn" id="langToggle" aria-label="Toggle language">
          <span id="langLabel">TR</span>
        </button>
        <button class="ctrl-btn icon-btn" id="themeToggle" aria-label="Toggle theme">
          <svg class="icon-sun" viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="12" r="4" fill="currentColor"/>
            <path d="M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
          <svg class="icon-moon" viewBox="0 0 24 24" fill="none">
            <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" fill="currentColor"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Main toggle card -->
    <section class="card">
      <div class="card-row">
        <div class="card-info">
          <p class="card-title" data-i18n="toggleTitle">Clean Search</p>
          <p class="card-sub"   data-i18n="toggleSub">Hide ads &amp; AI noise</p>
        </div>
        <button class="toggle-btn" id="mainToggle" aria-label="Toggle Ssh! Search">
          <span class="toggle-track">
            <span class="toggle-thumb"></span>
          </span>
        </button>
      </div>
      <div class="status-pill" id="statusPill">
        <span class="status-dot"></span>
        <span class="status-text" data-i18n="statusOn">Active</span>
      </div>
    </section>

    <!-- What's filtered -->
    <section class="card filters-card">
      <p class="section-label" data-i18n="filtersLabel">Filtered out</p>
      <ul class="filter-list">
        <li class="filter-item">
          <span class="filter-dot ads"></span>
          <span data-i18n="f1">Sponsored ads</span>
        </li>
        <li class="filter-item">
          <span class="filter-dot ai"></span>
          <span data-i18n="f2">AI Overview / Copilot</span>
        </li>
        <li class="filter-item">
          <span class="filter-dot noise"></span>
          <span data-i18n="f3">People Also Ask &amp; noise</span>
        </li>
        <li class="filter-item">
          <span class="filter-dot shop"></span>
          <span data-i18n="f4">Shopping carousels</span>
        </li>
      </ul>
    </section>

    <!-- Footer -->
    <footer class="footer">
      <p data-i18n="footerText">Just the results you came for.</p>
    </footer>

  </div>

  <script src="popup.js"></script>
</body>
</html>
