<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Static World</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body data-theme="light" data-lang="en">

  <div class="container">

    <!-- Header -->
    <header class="header">
      <div class="logo">
        <svg class="logo-icon" viewBox="0 0 28 28" fill="none">
          <!-- Pause / freeze symbol -->
          <rect x="3" y="3" width="22" height="22" rx="5"
                fill="var(--accent-soft)" stroke="var(--accent)" stroke-width="1.5"/>
          <!-- Two pause bars -->
          <rect x="9"  y="9" width="3.5" height="10" rx="1.5" fill="var(--accent)"/>
          <rect x="15.5" y="9" width="3.5" height="10" rx="1.5" fill="var(--accent)"/>
        </svg>
        <span class="logo-text">Static World</span>
      </div>

      <div class="header-controls">
        <button class="ctrl-btn" id="langToggle" aria-label="Toggle language">
          <span id="langLabel">TR</span>
        </button>
        <button class="ctrl-btn icon-btn" id="themeToggle" aria-label="Toggle theme">
          <svg class="icon-sun" viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="12" r="4" fill="currentColor"/>
            <path d="M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"
                  stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
          <svg class="icon-moon" viewBox="0 0 24 24" fill="none">
            <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" fill="currentColor"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Main toggle -->
    <section class="card main-card">
      <div class="card-row">
        <div class="card-info">
          <p class="card-title" data-i18n="toggleTitle">Freeze All Motion</p>
          <p class="card-sub"   data-i18n="toggleSub">Stop animations, videos &amp; GIFs</p>
        </div>
        <button class="toggle-btn" id="mainToggle" aria-label="Toggle Static World">
          <span class="toggle-track">
            <span class="toggle-thumb"></span>
          </span>
        </button>
      </div>
      <div class="status-pill" id="statusPill">
        <span class="status-dot"></span>
        <span class="status-text" data-i18n="statusOn">Active — Page is frozen</span>
      </div>
    </section>

    <!-- What's frozen -->
    <section class="card info-card">
      <p class="section-label" data-i18n="frozenLabel">What gets frozen</p>
      <ul class="frozen-list">
        <li class="frozen-item">
          <span class="frozen-icon">⏸</span>
          <span data-i18n="f1">CSS animations &amp; transitions</span>
        </li>
        <li class="frozen-item">
          <span class="frozen-icon">🎬</span>
          <span data-i18n="f2">Videos &amp; audio (auto-paused)</span>
        </li>
        <li class="frozen-item">
          <span class="frozen-icon">🖼</span>
          <span data-i18n="f3">Animated GIFs (first frame only)</span>
        </li>
        <li class="frozen-item">
          <span class="frozen-icon">↔</span>
          <span data-i18n="f4">Marquees &amp; SVG animations</span>
        </li>
      </ul>
    </section>

    <!-- Footer -->
    <footer class="footer">
      <p data-i18n="footerText">Calm web. Clear mind.</p>
    </footer>

  </div>

  <script src="popup.js"></script>
</body>
</html>
