<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tab Sovereign</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body class="theme-dark">

  <div class="container">

    <!-- Header -->
    <header class="header">
      <div class="brand">
        <svg class="brand-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M3 6C3 4.34315 4.34315 3 6 3H18C19.6569 3 21 4.34315 21 6V8H3V6Z" fill="currentColor" opacity="0.4"/>
          <rect x="3" y="8" width="18" height="13" rx="1" stroke="currentColor" stroke-width="1.5" fill="none"/>
          <path d="M3 8H21" stroke="currentColor" stroke-width="1.5"/>
          <path d="M7 12H12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <path d="M7 15.5H10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <circle cx="17.5" cy="14.5" r="2.5" fill="currentColor" opacity="0.6"/>
          <path d="M17.5 13.5V14.5L18.2 15.2" stroke="white" stroke-width="1" stroke-linecap="round"/>
        </svg>
        <span class="brand-name">Tab Sovereign</span>
      </div>
      <div class="header-actions">
        <button class="icon-btn" id="btn-lang" title="Switch Language">
          <span id="lang-label">EN</span>
        </button>
        <button class="icon-btn" id="btn-theme" title="Switch Theme">
          <svg id="icon-sun" viewBox="0 0 24 24" fill="none" width="16" height="16">
            <circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="1.8"/>
            <path d="M12 2v2M12 20v2M2 12h2M20 12h2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
          <svg id="icon-moon" viewBox="0 0 24 24" fill="none" width="16" height="16" style="display:none">
            <path d="M21 12.79A9 9 0 1111.21 3a7 7 0 109.79 9.79z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Power Toggle -->
    <section class="power-section">
      <div class="power-ring" id="power-ring">
        <button class="power-btn" id="btn-power" aria-pressed="true">
          <svg viewBox="0 0 24 24" fill="none" width="28" height="28">
            <path d="M12 3v5" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
            <path d="M18.364 5.636A9 9 0 1 1 5.636 5.636" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" fill="none"/>
          </svg>
        </button>
      </div>
      <p class="power-status" id="power-status">Active</p>
    </section>

    <!-- Stats Bar -->
    <div class="stats-bar">
      <div class="stat">
        <span class="stat-value" id="stat-total">–</span>
        <span class="stat-label" data-i18n="statTotal">Total</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat">
        <span class="stat-value" id="stat-sleeping">–</span>
        <span class="stat-label" data-i18n="statSleeping">Sleeping</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat">
        <span class="stat-value" id="stat-active">–</span>
        <span class="stat-label" data-i18n="statActive">Active</span>
      </div>
    </div>

    <!-- Timeout Setting -->
    <div class="setting-row">
      <label class="setting-label" for="select-timeout" data-i18n="labelTimeout">Sleep after</label>
      <div class="select-wrapper">
        <select id="select-timeout">
          <option value="15" data-i18n-opt="opt15">15 min</option>
          <option value="30" data-i18n-opt="opt30" selected>30 min</option>
          <option value="60" data-i18n-opt="opt60">1 hour</option>
        </select>
        <svg class="select-arrow" viewBox="0 0 12 8" fill="none" width="10">
          <path d="M1 1l5 5 5-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </div>
    </div>

    <!-- Footer note -->
    <p class="footnote" data-i18n="footnote">Pinned & audio tabs are never slept.</p>

  </div>

  <script src="popup.js"></script>
</body>
</html>
