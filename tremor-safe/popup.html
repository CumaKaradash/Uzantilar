<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tremor-Safe Click</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body data-theme="light" data-lang="en">

  <div class="container">

    <!-- Header -->
    <header class="header">
      <div class="logo">
        <svg class="logo-icon" viewBox="0 0 28 28" fill="none">
          <!-- Cursor arrow -->
          <path d="M6 4L6 20L10 16L13 22L15.5 21L12.5 15L18 15L6 4Z"
                fill="currentColor" opacity="0.9"/>
          <!-- Expanding rings -->
          <circle cx="7" cy="21" r="3.5" stroke="var(--accent)"
                  stroke-width="1.4" stroke-dasharray="3 2" opacity="0.7"/>
          <circle cx="7" cy="21" r="6"   stroke="var(--accent)"
                  stroke-width="1" stroke-dasharray="2 3" opacity="0.4"/>
        </svg>
        <span class="logo-text">Tremor-Safe Click</span>
      </div>

      <div class="header-controls">
        <button class="ctrl-btn" id="langToggle" aria-label="Toggle language">
          <span id="langLabel">TR</span>
        </button>
        <button class="ctrl-btn icon-btn" id="themeToggle" aria-label="Toggle theme">
          <svg class="icon-sun" viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="12" r="4" fill="currentColor"/>
            <path d="M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"
                  stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
          <svg class="icon-moon" viewBox="0 0 24 24" fill="none">
            <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" fill="currentColor"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Main toggle card -->
    <section class="card">
      <div class="card-row">
        <div class="card-info">
          <p class="card-title" data-i18n="toggleTitle">Expand Click Areas</p>
          <p class="card-sub"   data-i18n="toggleSub">Larger targets, no layout change</p>
        </div>
        <button class="toggle-btn" id="mainToggle" aria-label="Toggle Tremor-Safe Click">
          <span class="toggle-track">
            <span class="toggle-thumb"></span>
          </span>
        </button>
      </div>
      <div class="status-pill" id="statusPill">
        <span class="status-dot"></span>
        <span class="status-text" data-i18n="statusOn">Active</span>
      </div>
    </section>

    <!-- Size selector card -->
    <section class="card size-card">
      <p class="section-label" data-i18n="sizeLabel">Expansion size</p>
      <div class="size-group" id="sizeGroup" role="group" aria-label="Expansion size">

        <button class="size-btn" data-size="sm" aria-pressed="false">
          <span class="size-visual sm-vis">
            <span class="size-inner"></span>
          </span>
          <span class="size-name" data-i18n="sizeSm">Small</span>
          <span class="size-px">+10px</span>
        </button>

        <button class="size-btn" data-size="md" aria-pressed="true">
          <span class="size-visual md-vis">
            <span class="size-inner"></span>
          </span>
          <span class="size-name" data-i18n="sizeMd">Medium</span>
          <span class="size-px">+20px</span>
        </button>

        <button class="size-btn" data-size="lg" aria-pressed="false">
          <span class="size-visual lg-vis">
            <span class="size-inner"></span>
          </span>
          <span class="size-name" data-i18n="sizeLg">Large</span>
          <span class="size-px">+30px</span>
        </button>

      </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
      <p data-i18n="footerText">Every tap counts. Make it easier.</p>
    </footer>

  </div>

  <script src="popup.js"></script>
</body>
</html>
