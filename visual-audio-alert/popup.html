<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Visual Audio Alert</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body data-theme="light" data-lang="en">

  <div class="container">

    <!-- Header -->
    <header class="header">
      <div class="logo">
        <div class="logo-icon" aria-hidden="true">
          <div class="logo-wave w1"></div>
          <div class="logo-wave w2"></div>
          <div class="logo-wave w3"></div>
        </div>
        <span class="logo-text">Visual Audio Alert</span>
      </div>
      <div class="header-controls">
        <button class="ctrl-btn" id="langToggle" aria-label="Toggle language">
          <span id="langLabel">TR</span>
        </button>
        <button class="ctrl-btn icon-btn" id="themeToggle" aria-label="Toggle theme">
          <svg class="icon-sun" viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="12" r="4" fill="currentColor"/>
            <path d="M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
          <svg class="icon-moon" viewBox="0 0 24 24" fill="none">
            <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" fill="currentColor"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Main toggle -->
    <section class="card">
      <div class="card-row">
        <div class="card-info">
          <p class="card-title" data-i18n="toggleTitle">Visual Flash</p>
          <p class="card-sub"   data-i18n="toggleSub">Turn audio into light alerts</p>
        </div>
        <button class="toggle-btn" id="mainToggle" aria-label="Toggle Visual Audio Alert">
          <span class="toggle-track">
            <span class="toggle-thumb"></span>
          </span>
        </button>
      </div>
      <div class="status-pill" id="statusPill">
        <span class="status-dot"></span>
        <span class="status-text" data-i18n="statusOn">Listening…</span>
      </div>
    </section>

    <!-- Sensitivity card -->
    <section class="card sens-card">
      <p class="section-label" data-i18n="sensLabel">Sensitivity</p>

      <div class="sens-group" id="sensGroup">
        <button class="sens-btn" data-sens="low"    aria-pressed="false">
          <span class="sens-bars">
            <span class="bar b1"></span>
            <span class="bar b2 dim"></span>
            <span class="bar b3 dim"></span>
          </span>
          <span data-i18n="sensLow">Low</span>
        </button>
        <button class="sens-btn" data-sens="medium" aria-pressed="true">
          <span class="sens-bars">
            <span class="bar b1"></span>
            <span class="bar b2"></span>
            <span class="bar b3 dim"></span>
          </span>
          <span data-i18n="sensMed">Medium</span>
        </button>
        <button class="sens-btn" data-sens="high"   aria-pressed="false">
          <span class="sens-bars">
            <span class="bar b1"></span>
            <span class="bar b2"></span>
            <span class="bar b3"></span>
          </span>
          <span data-i18n="sensHigh">High</span>
        </button>
      </div>

      <p class="sens-hint" id="sensHint" data-i18n="sensHintMed">Triggers on moderate sound</p>
    </section>

    <!-- Color legend -->
    <section class="card legend-card">
      <p class="section-label" data-i18n="legendLabel">Flash colors</p>
      <ul class="legend-list">
        <li class="legend-item">
          <span class="legend-dot blue"></span>
          <span data-i18n="l1">Low volume</span>
        </li>
        <li class="legend-item">
          <span class="legend-dot orange"></span>
          <span data-i18n="l2">Medium volume</span>
        </li>
        <li class="legend-item">
          <span class="legend-dot red"></span>
          <span data-i18n="l3">High volume</span>
        </li>
      </ul>
    </section>

    <!-- Permission note -->
    <p class="note" id="permNote" data-i18n="permNote">
      Tab audio permission required when enabling.
    </p>

    <!-- Footer -->
    <footer class="footer">
      <p data-i18n="footerText">See every sound. Miss nothing.</p>
    </footer>

  </div>

  <script src="popup.js"></script>
</body>
</html>
